<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SPZ Skener">
<meta name="theme-color" content="#080a0d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<title>SPZ Skener</title>
<style>
/* ── Reset & base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:       #080a0d;
  --surface:  #0f1318;
  --card:     #13181f;
  --border:   #1c2330;
  --border2:  #253040;
  --amber:    #f0c040;
  --amber2:   #c8981a;
  --blue:     #3b82f6;
  --green:    #22c55e;
  --red:      #ef4444;
  --text:     #e2e8f0;
  --muted:    #4a5568;
  --muted2:   #2d3748;
  --safe:     env(safe-area-inset-bottom, 0px);
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

/* ── App shell ────────────────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
}

/* ── Header ───────────────────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  padding-top: calc(14px + env(safe-area-inset-top, 0px));
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 34px; height: 34px;
  background: var(--amber);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 700;
  color: #080a0d;
}

.logo-text {
  font-size: 1.5rem; font-weight: 800;
  letter-spacing: 2px; line-height: 1;
}
.logo-text span { color: var(--amber); }

.settings-btn {
  width: 36px; height: 36px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px;
  transition: border-color 0.2s;
}
.settings-btn:active { background: var(--border); }

/* ── Tab bar ──────────────────────────────────────────────────────────────── */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  flex: 1; padding: 10px 0;
  text-align: center;
  font-size: 0.75rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace;
}
.tab.active { color: var(--amber); border-bottom-color: var(--amber); }

/* ── Pages ────────────────────────────────────────────────────────────────── */
.page { display: none; flex: 1; overflow-y: auto; overflow-x: hidden; flex-direction: column; }
.page.active { display: flex; }

/* ── SCANNER PAGE ─────────────────────────────────────────────────────────── */
#page-scan {
  position: relative;
  background: #000;
}

/* Camera viewfinder */
.viewfinder {
  position: relative;
  flex: 1;
  overflow: hidden;
  background: #000;
  display: flex; align-items: center; justify-content: center;
}

#video {
  width: 100%; height: 100%;
  object-fit: cover;
}

#snap-canvas { display: none; }

/* Scan overlay */
.scan-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
}

/* Corner brackets */
.bracket {
  position: absolute;
  width: 44px; height: 44px;
}
.bracket::before, .bracket::after {
  content: '';
  position: absolute;
  background: var(--amber);
}
.bracket.tl { top: 20%; left: 8%; }
.bracket.tl::before { top:0;left:0; width:100%;height:3px; }
.bracket.tl::after  { top:0;left:0; width:3px;height:100%; }
.bracket.tr { top: 20%; right: 8%; }
.bracket.tr::before { top:0;right:0; width:100%;height:3px; }
.bracket.tr::after  { top:0;right:0; width:3px;height:100%; }
.bracket.bl { bottom: 20%; left: 8%; }
.bracket.bl::before { bottom:0;left:0; width:100%;height:3px; }
.bracket.bl::after  { bottom:0;left:0; width:3px;height:100%; }
.bracket.br { bottom: 20%; right: 8%; }
.bracket.br::before { bottom:0;right:0; width:100%;height:3px; }
.bracket.br::after  { bottom:0;right:0; width:3px;height:100%; }

/* Scanline animation */
.scanline {
  position: absolute;
  left: 8%; right: 8%;
  top: 20%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--amber), transparent);
  box-shadow: 0 0 12px var(--amber);
  animation: scanmove 2.5s ease-in-out infinite;
  opacity: 0;
}
.scanning-active .scanline { opacity: 1; }
@keyframes scanmove {
  0%   { top: 20%; }
  50%  { top: 78%; }
  100% { top: 20%; }
}

/* Target zone label */
.target-label {
  position: absolute;
  top: calc(20% - 28px);
  left: 50%; transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem; letter-spacing: 3px;
  color: var(--amber); opacity: 0.7;
  white-space: nowrap;
}

/* No camera message */
.no-cam {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  padding: 40px;
  flex: 1;
}
.no-cam.show { display: flex; }
.no-cam-icon { font-size: 56px; opacity: 0.3; }
.no-cam h3 { font-size: 1.3rem; font-weight: 700; color: var(--muted); letter-spacing: 1px; }
.no-cam p { font-size: 0.9rem; color: var(--muted); line-height: 1.6; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; }

/* Controls bar */
.controls {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 16px 18px;
  padding-bottom: calc(16px + var(--safe));
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  flex-shrink: 0;
}

.upload-btn {
  width: 52px; height: 52px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 22px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.upload-btn:active { background: var(--border2); transform: scale(0.95); }

/* Main shutter button */
.shutter {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--amber);
  border: 4px solid var(--amber2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  position: relative;
  flex-shrink: 0;
  box-shadow: 0 0 0 6px rgba(240,192,64,0.12);
}
.shutter:active { transform: scale(0.93); }
.shutter.loading {
  background: var(--border2);
  border-color: var(--muted2);
  animation: shutterPulse 1s ease-in-out infinite;
}
@keyframes shutterPulse { 0%,100%{box-shadow:0 0 0 6px rgba(240,192,64,0.08)} 50%{box-shadow:0 0 0 12px rgba(240,192,64,0.04)} }
.shutter-inner {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: #080a0d;
  opacity: 0.3;
}
.shutter.loading .shutter-inner { opacity: 0; }
.shutter-spinner {
  display: none;
  width: 28px; height: 28px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  position: absolute;
}
.shutter.loading .shutter-spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

.flip-btn {
  width: 52px; height: 52px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 22px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.flip-btn:active { background: var(--border2); transform: scale(0.95); }

/* Result toast */
.result-toast {
  position: absolute;
  bottom: 100px;
  left: 16px; right: 16px;
  background: rgba(13, 18, 25, 0.97);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 16px 18px;
  display: none;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes toastIn { from { opacity:0; transform:translateY(20px) scale(0.95); } }
.result-toast.show { display: block; }

.toast-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem; letter-spacing: 3px; color: var(--muted);
  text-transform: uppercase; margin-bottom: 10px;
}

.toast-plate {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.mini-plate {
  display: flex;
  align-items: stretch;
  border-radius: 5px;
  overflow: hidden;
  border: 2px solid #222;
  box-shadow: 0 3px 12px rgba(0,0,0,0.5);
}
.mini-eu {
  background: #003399;
  width: 22px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1px; padding: 4px 2px;
}
.mini-stars { color:#FFD700; font-size:5px; line-height:1.3; text-align:center; }
.mini-cc { color:#FFD700; font-size:7px; font-weight:bold; font-family:'JetBrains Mono',monospace; }
.mini-num {
  background: #f5f0e0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.4rem; font-weight: 700;
  color: #111; letter-spacing: 3px;
  padding: 6px 12px;
}

.toast-not-found {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; color: var(--red);
  letter-spacing: 2px;
}

.toast-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; color: var(--muted);
  letter-spacing: 1px; line-height: 1.6;
}

.toast-close {
  position: absolute; top: 10px; right: 12px;
  background: none; border: none;
  color: var(--muted); font-size: 18px; cursor: pointer;
  line-height: 1;
}

/* Preview overlay for uploaded image */
.preview-overlay {
  position: absolute; inset: 0;
  display: none;
  background: #000;
  z-index: 5;
}
.preview-overlay.show { display: flex; align-items: center; justify-content: center; }
.preview-overlay img {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
}
.preview-close {
  position: absolute; top: 12px; right: 12px;
  width: 36px; height: 36px;
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--border2);
  border-radius: 50%;
  color: var(--text); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

/* ── HISTORY PAGE ─────────────────────────────────────────────────────────── */
#page-history {
  background: var(--bg);
}

.history-header {
  padding: 16px 18px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.history-title {
  font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; color: var(--text);
}
.clear-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; letter-spacing: 1px; padding: 6px 12px;
  border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
.clear-btn:active { background: var(--border); color: var(--red); border-color: var(--red); }

.history-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: calc(12px + var(--safe));
}

.history-empty {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; color: var(--muted);
  padding: 40px;
}
.history-empty-icon { font-size: 48px; opacity: 0.2; }
.history-empty p { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; letter-spacing: 2px; text-align: center; }

.history-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  animation: itemIn 0.2s ease;
}
@keyframes itemIn { from { opacity:0; transform:translateY(8px); } }

.history-thumb {
  width: 56px; height: 42px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--muted2);
  border: 1px solid var(--border2);
}
.history-thumb-placeholder {
  width: 56px; height: 42px;
  border-radius: 6px;
  background: var(--muted2);
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}

.history-info { flex: 1; min-width: 0; }

.history-plate {
  display: flex; align-items: stretch;
  border-radius: 4px; overflow: hidden;
  border: 2px solid #1a1a1a;
  width: fit-content;
  margin-bottom: 6px;
}
.h-eu {
  background: #003399; width: 18px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1px; padding: 3px 1px;
}
.h-stars { color:#FFD700; font-size:4px; line-height:1.3; text-align:center; }
.h-cc { color:#FFD700; font-size:6px; font-weight:bold; font-family:'JetBrains Mono',monospace; }
.h-num {
  background: #f5f0e0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem; font-weight: 700;
  color: #111; letter-spacing: 2px;
  padding: 4px 10px;
}
.history-not-found {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem; color: var(--red); letter-spacing: 1px;
  margin-bottom: 6px;
}

.history-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem; color: var(--muted); letter-spacing: 1px;
}

.history-delete {
  background: none; border: none;
  color: var(--muted2); font-size: 18px;
  cursor: pointer; padding: 4px;
  border-radius: 6px; transition: color 0.2s;
  flex-shrink: 0;
}
.history-delete:active { color: var(--red); }

.ckp-btn {
  background: none; border: 1px solid var(--border2);
  color: var(--muted); font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem; letter-spacing: 1px; padding: 5px 8px;
  border-radius: 6px; cursor: pointer; transition: all 0.2s;
  white-space: nowrap; flex-shrink: 0;
}
.ckp-btn:hover { border-color: var(--amber); color: var(--amber); }
.ckp-btn:active { background: rgba(240,192,64,0.1); }

/* ── DETAIL MODAL ────────────────────────────────────────────────────────── */
.detail-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(6px);
}
.detail-backdrop.show { display: flex; }

.detail-modal {
  width: 100%; max-width: 440px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  overflow: hidden;
  animation: detailIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes detailIn { from { opacity:0; transform:scale(0.92); } }

.detail-img-wrap {
  width: 100%; aspect-ratio: 16/9;
  background: #000;
  position: relative;
  overflow: hidden;
}
.detail-img-wrap img {
  width: 100%; height: 100%;
  object-fit: contain;
}
.detail-img-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 56px; opacity: 0.15;
}

.detail-body { padding: 18px 20px 20px; }

.detail-plate-wrap {
  display: flex; justify-content: center;
  margin-bottom: 14px;
}
.detail-scene {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; color: var(--text);
  letter-spacing: 1px; line-height: 1.7;
  background: rgba(0,0,0,0.3);
  border-left: 3px solid var(--border2);
  padding: 10px 14px; border-radius: 2px;
  margin-bottom: 14px;
}
.detail-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem; color: var(--muted);
  letter-spacing: 1px; margin-bottom: 16px;
}

.detail-actions {
  display: flex; gap: 10px;
}
.detail-copy-btn {
  flex: 1;
  background: var(--amber); color: #080a0d;
  border: none; border-radius: 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem; font-weight: 800;
  letter-spacing: 2px; padding: 12px;
  cursor: pointer; transition: opacity 0.2s;
}
.detail-copy-btn:active { opacity: 0.8; }
.detail-close-btn {
  background: var(--card); color: var(--muted);
  border: 1px solid var(--border2); border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; letter-spacing: 1px;
  padding: 12px 16px; cursor: pointer; transition: all 0.2s;
}
.detail-close-btn:active { background: var(--border); }

/* ── SETTINGS MODAL ───────────────────────────────────────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  display: none;
  align-items: flex-end;
  backdrop-filter: blur(4px);
}
.modal-backdrop.show { display: flex; }

.modal {
  width: 100%; max-width: 480px;
  margin: 0 auto;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border2);
  padding: 0 0 calc(20px + var(--safe));
  animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes slideUp { from { transform: translateY(100%); } }

.modal-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 12px auto 0;
}

.modal-title {
  font-size: 1.2rem; font-weight: 800;
  letter-spacing: 2px; padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}

.modal-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }

.field-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; letter-spacing: 3px; color: var(--muted);
  text-transform: uppercase; display: block; margin-bottom: 8px;
}

.key-row { display: flex; gap: 8px; }

.key-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; padding: 12px 14px;
  border-radius: 10px; outline: none;
  transition: border-color 0.2s;
}
.key-input:focus { border-color: var(--amber); }
.key-input::placeholder { color: var(--muted); }

.eye-btn {
  background: var(--card); border: 1px solid var(--border2);
  color: var(--muted); width: 46px; border-radius: 10px;
  font-size: 18px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.eye-btn:active { background: var(--border); }

.key-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; color: var(--muted); letter-spacing: 1px;
  line-height: 1.8;
}
.key-hint a { color: var(--amber); text-decoration: none; }

.save-btn {
  width: 100%;
  background: var(--amber);
  color: #080a0d;
  border: none;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem; font-weight: 800;
  letter-spacing: 3px; padding: 14px;
  border-radius: 12px; cursor: pointer;
  transition: opacity 0.2s;
  margin-top: 4px;
}
.save-btn:active { opacity: 0.85; }

.key-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; letter-spacing: 2px;
  padding: 6px 10px; border-radius: 6px;
  display: none; text-align: center;
}
.key-status.ok { display:block; background:rgba(34,197,94,0.1); color:var(--green); border:1px solid rgba(34,197,94,0.2); }
.key-status.err { display:block; background:rgba(239,68,68,0.1); color:var(--red); border:1px solid rgba(239,68,68,0.2); }

/* Input file hidden */
#file-input { display: none; }

/* ── Landscape layout ─────────────────────────────────────────────────────── */
@media (orientation: landscape) and (max-height: 500px) {
  /* Hide header and tabs — full screen camera */
  header, .tabs { display: none; }

  #app {
    height: 100dvh;
  }

  #page-scan {
    flex-direction: row;
    flex: 1;
    height: 100dvh;
  }

  .viewfinder {
    flex: 1;
    height: 100dvh;
  }

  .controls {
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-top: none;
    border-left: 1px solid var(--border);
    padding: 16px 14px;
    padding-right: calc(14px + env(safe-area-inset-right, 0px));
    padding-bottom: calc(16px + var(--safe));

  }

        Uložen pouze v tomto prohlížeči · nikam se neposílá

<input type="file" id="file-input" accept="image/*" capture="environment">

<script>
// ── State ──────────────────────────────────────────────────────────────────
let stream = null;
let facingMode = 'environment';
let isAnalyzing = false;
let history = JSON.parse(localStorage.getItem('spz_history') || '[]');
let apiKey = localStorage.getItem('spz_apikey') || '';
let currentImageB64 = null;
let currentMime = 'image/jpeg';
let usingUploadedImage = false;

// ── DOM refs ───────────────────────────────────────────────────────────────
const video         = document.getElementById('video');
const snapCanvas    = document.getElementById('snap-canvas');
const shutter       = document.getElementById('shutter');
const uploadBtn     = document.getElementById('uploadBtn');
const flipBtn       = document.getElementById('flipBtn');
const fileInput     = document.getElementById('file-input');
const scanOverlay   = document.getElementById('scanOverlay');
const noCam         = document.getElementById('noCam');
const resultToast   = document.getElementById('resultToast');
const toastClose    = document.getElementById('toastClose');
const toastLabel    = document.getElementById('toastLabel');
const toastPlate    = document.getElementById('toastPlate');
const toastMeta     = document.getElementById('toastMeta');
const historyList   = document.getElementById('historyList');
const settingsBtn   = document.getElementById('settingsBtn');
const settingsModal = document.getElementById('settingsModal');
const keyInput      = document.getElementById('keyInput');
const eyeBtn        = document.getElementById('eyeBtn');
const saveKeyBtn    = document.getElementById('saveKeyBtn');
const keyStatus     = document.getElementById('keyStatus');
const clearHistBtn  = document.getElementById('clearHistoryBtn');
const previewOverlay = document.getElementById('previewOverlay');
const previewImg    = document.getElementById('previewImg');
const previewClose  = document.getElementById('previewClose');

// ── Tabs ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const name = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-' + name).classList.add('active');
    if (name === 'history') renderHistory();
  });
});

// ── Camera ─────────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    video.style.display = 'block';
    noCam.classList.remove('show');
  } catch (e) {
    video.style.display = 'none';
    noCam.classList.add('show');
  }
}

flipBtn.addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});

// ── Capture from camera ────────────────────────────────────────────────────
function captureFrame() {
  const vw = video.videoWidth || 1280;
  const vh = video.videoHeight || 720;

  // Detect orientation — on mobile the video stream can be rotated
  // screen.orientation.angle: 0=portrait, 90=landscape-left, -90/270=landscape-right
  const angle = (screen.orientation && screen.orientation.angle) || window.orientation || 0;
  const rotate = angle === 90 || angle === -90 || angle === 270;

  // If rotated, swap canvas dimensions so the output is always landscape-correct
  snapCanvas.width  = rotate ? vh : vw;
  snapCanvas.height = rotate ? vw : vh;

  const ctx = snapCanvas.getContext('2d');

  if (rotate) {
    // Rotate canvas 90° to correct orientation
    ctx.translate(snapCanvas.width / 2, snapCanvas.height / 2);
    ctx.rotate((angle === 90 ? 1 : -1) * Math.PI / 2);
    ctx.drawImage(video, -vw / 2, -vh / 2, vw, vh);
    ctx.setTransform(1, 0, 0, 1, 0, 0); // reset transform
  } else {
    ctx.drawImage(video, 0, 0, vw, vh);
  }

  return {
    b64: snapCanvas.toDataURL('image/jpeg', 0.92).split(',')[1],
    mime: 'image/jpeg'
  };
}

// ── Shutter ────────────────────────────────────────────────────────────────
shutter.addEventListener('click', async () => {
  if (isAnalyzing) return;
  if (!apiKey) { openSettings('Nejprve nastav API klíč!'); return; }

  let b64, mime;

  if (usingUploadedImage && currentImageB64) {
    b64 = currentImageB64;
    mime = currentMime;
  } else {
    if (!stream) { alert('Kamera není dostupná. Použij galerii.'); return; }
    const captured = captureFrame();
    b64 = captured.b64;
    mime = captured.mime;
  }

  await analyze(b64, mime, null);
});

// ── Upload from gallery ────────────────────────────────────────────────────
uploadBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    currentImageB64 = dataUrl.split(',')[1];
    currentMime = file.type || 'image/jpeg';
    usingUploadedImage = true;
    // Show preview
    previewImg.src = dataUrl;
    previewOverlay.classList.add('show');
    hideToast();
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
});

previewClose.addEventListener('click', () => {
  previewOverlay.classList.remove('show');
  usingUploadedImage = false;
  currentImageB64 = null;
});

// ── Analyze with Claude API ────────────────────────────────────────────────
async function analyze(b64, mime, thumbnailUrl) {
  isAnalyzing = true;
  shutter.classList.add('loading');
  scanOverlay.classList.add('scanning-active');
  hideToast();

  // Capture thumbnail if from camera
  if (!thumbnailUrl && stream) {
    thumbnailUrl = snapCanvas.toDataURL('image/jpeg', 0.4);
  } else if (!thumbnailUrl && usingUploadedImage) {
    thumbnailUrl = previewImg.src;
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 300,
        system: `Jsi OCR systém specializovaný na SPZ. Odpověz POUZE jako validní JSON bez markdown:
{"found":true,"spz":"1A2 3456","country":"CZ","vehicle":"červené osobní auto","confidence":"high"}
Pokud SPZ není čitelná: {"found":false,"vehicle":"popis co je vidět","confidence":"low"}
Pravidla: spz vždy VELKÝMI PÍSMENY s mezerou (1A2 3456 nebo 1AB 1234), country = kód státu (CZ/SK/DE/...).`,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mime, data: b64 } },
            { type: 'text', text: 'Rozpoznej SPZ.' }
          ]
        }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw = (data.content || []).map(x => x.text || '').join('');
    const result = JSON.parse(raw.replace(/```json|```/g, '').trim());

    showToast(result);
    saveToHistory(result, thumbnailUrl);

    // Close preview overlay after scan
    if (usingUploadedImage) {
      setTimeout(() => {
        previewOverlay.classList.remove('show');
        usingUploadedImage = false;
      }, 400);
    }

  } catch(e) {
    showToastError(e.message.includes('401') ? 'Neplatný API klíč' : e.message.substring(0, 60));
  } finally {
    isAnalyzing = false;
    shutter.classList.remove('loading');
    scanOverlay.classList.remove('scanning-active');
  }
}

// ── Toast ──────────────────────────────────────────────────────────────────
async function copyToClipboard(spz) {
  if (!spz) return;
  try {
    await navigator.clipboard.writeText(spz);
  } catch(e) {
    const el = document.createElement('textarea');
    el.value = spz; el.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
  }
  showCopyFeedback(spz);
}

function showCopyFeedback(spz) {
  const fb = document.createElement('div');
  fb.style.cssText = `
    position:fixed;bottom:130px;left:50%;transform:translateX(-50%);
    background:var(--green);color:#080a0d;
    font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;letter-spacing:2px;
    padding:8px 18px;border-radius:20px;z-index:9999;white-space:nowrap;pointer-events:none;
  `;
  fb.textContent = `✓ ZKOPÍROVÁNO: ${spz}`;
  document.body.appendChild(fb);
  setTimeout(() => fb.remove(), 1600);
}

function showToast(result) {
  toastPlate.innerHTML = '';
  toastMeta.innerHTML = '';

  if (result.found && result.spz) {
    toastLabel.textContent = '▸ SPZ ROZPOZNÁNA · ZKOPÍROVÁNO DO SCHRÁNKY';
    const plate = document.createElement('div');
    plate.className = 'mini-plate';
    plate.style.cursor = 'pointer';
    plate.title = 'Klikni pro opětovné kopírování';
    plate.innerHTML = `
      <div class="mini-eu">
        <span class="mini-stars">★★★<br>★ ★<br>★★★</span>
        <span class="mini-cc">${(result.country||'CZ').toUpperCase()}</span>
      </div>
      <span class="mini-num">${escHtml(result.spz)}</span>`;
    plate.addEventListener('click', () => copyToClipboard(result.spz));
    toastPlate.appendChild(plate);
    if (result.vehicle) toastMeta.textContent = result.vehicle;
    copyToClipboard(result.spz);
  } else {
    toastLabel.textContent = '▸ VÝSLEDEK';
    toastPlate.innerHTML = `<span class="toast-not-found">SPZ NENALEZENA</span>`;
    if (result.vehicle) toastMeta.textContent = result.vehicle;
  }

  resultToast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(hideToast, 6000);
}

function showToastError(msg) {
  toastLabel.textContent = '▸ CHYBA';
  toastPlate.innerHTML = `<span class="toast-not-found" style="color:#f0c040">${escHtml(msg)}</span>`;
  toastMeta.innerHTML = '';
  resultToast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(hideToast, 5000);
}

function hideToast() { resultToast.classList.remove('show'); }
toastClose.addEventListener('click', hideToast);

// ── History ────────────────────────────────────────────────────────────────
function saveToHistory(result, thumbnail) {
  const entry = {
    id: Date.now(),
    timestamp: new Date().toISOString(),
    found: result.found,
    spz: result.spz || null,
    country: result.country || 'CZ',
    vehicle: result.vehicle || '',
    thumbnail: thumbnail || null
  };
  history.unshift(entry);
  if (history.length > 100) history = history.slice(0, 100);
  localStorage.setItem('spz_history', JSON.stringify(history));
}

function renderHistory() {
  historyList.innerHTML = '';

  if (history.length === 0) {
    historyList.innerHTML = `
      <div class="history-empty">
        <div class="history-empty-icon">🔍</div>
        <p>ZATÍM ŽÁDNÉ SKENY<br>NASKENUJTE PRVNÍ SPZ</p>
      </div>`;
    return;
  }

  history.forEach((entry, idx) => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.style.cursor = 'pointer';
    div.dataset.idx = idx;
    div.innerHTML = `
      ${entry.thumbnail
        ? `<img class="history-thumb" src="${entry.thumbnail}" alt="">`
        : `<div class="history-thumb-placeholder">🚗</div>`}
      <div class="history-info">
        ${entry.found && entry.spz
          ? `<div class="history-plate" style="cursor:pointer" title="Klikni pro kopírování" onclick="copyToClipboard('${escHtml(entry.spz)}')">
              <div class="h-eu">
                <span class="h-stars">★★★<br>★ ★<br>★★★</span>
                <span class="h-cc">${escHtml((entry.country||'CZ').toUpperCase())}</span>
              </div>
              <span class="h-num">${escHtml(entry.spz)}</span>
            </div>`
          : `<div class="history-not-found">🔍 ${escHtml((entry.vehicle||'SPZ nenalezena').substring(0,35))}</div>`}
        <div class="history-time">${formatTime(entry.timestamp)}${entry.vehicle ? ' · ' + entry.vehicle.substring(0,30) : ''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0">
        ${entry.found && entry.spz ? `<button class="ckp-btn" data-spz="${entry.spz}">🛡 CKP</button>` : ''}
        <button class="history-delete" data-idx="${idx}">🗑</button>
      </div>
    `;
    historyList.appendChild(div);
  });

  document.querySelectorAll('.history-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx);
      history.splice(idx, 1);
      localStorage.setItem('spz_history', JSON.stringify(history));
      renderHistory();
    });
  });

  document.querySelectorAll('.ckp-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const spz = btn.dataset.spz;
      navigator.clipboard.writeText(spz).catch(() => {
        const el = document.createElement('textarea');
        el.value = spz; el.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(el); el.select();
        document.execCommand('copy'); document.body.removeChild(el);
      });
      showCopyFeedback(spz);
      window.open('https://ic.ckp.cz/ICwww/servlet?_page=searchSPZ', '_blank');
    });
  });

  document.querySelectorAll('.history-delete').forEach(btn => {
    btn.addEventListener('click', (e) => e.stopPropagation());
  });

  document.querySelectorAll('.history-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = parseInt(item.dataset.idx);
      openDetailModal(history[idx]);
    });
  });
}

clearHistBtn.addEventListener('click', () => {
  if (history.length === 0) return;
  if (confirm('Smazat celou historii?')) {
    history = [];
    localStorage.setItem('spz_history', JSON.stringify(history));
    renderHistory();
  }
});

function formatTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'Právě teď';
  if (diff < 3600) return `Před ${Math.floor(diff/60)} min`;
  if (diff < 86400) return `Dnes ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  return `${d.getDate()}.${d.getMonth()+1}. ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── Detail modal ──────────────────────────────────────────────────────────
const detailModal    = document.getElementById('detailModal');
const detailImgWrap  = document.getElementById('detailImgWrap');
const detailPlateWrap= document.getElementById('detailPlateWrap');
const detailScene    = document.getElementById('detailScene');
const detailTime     = document.getElementById('detailTime');
const detailCopyBtn  = document.getElementById('detailCopyBtn');
const detailCloseBtn = document.getElementById('detailCloseBtn');

function openDetailModal(entry) {
  // Image
  detailImgWrap.innerHTML = '';
  if (entry.thumbnail) {
    const img = document.createElement('img');
    img.src = entry.thumbnail;
    detailImgWrap.appendChild(img);
  } else {
    detailImgWrap.innerHTML = '<div class="detail-img-placeholder">📷</div>';
  }

  // Plate or no-plate
  detailPlateWrap.innerHTML = '';
  if (entry.found && entry.spz) {
    const plate = document.createElement('div');
    plate.className = 'mini-plate';
    plate.style.transform = 'scale(1.3)';
    plate.style.margin = '8px 0';
    plate.innerHTML = `
      <div class="mini-eu">
        <span class="mini-stars">★★★<br>★ ★<br>★★★</span>
        <span class="mini-cc">${escHtml((entry.country||'CZ').toUpperCase())}</span>
      </div>
      <span class="mini-num">${escHtml(entry.spz)}</span>`;
    detailPlateWrap.appendChild(plate);
  } else {
    detailPlateWrap.innerHTML = `<span style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--red);letter-spacing:2px">SPZ NENALEZENA</span>`;
  }

  // Scene description
  detailScene.textContent = entry.vehicle || 'Žádný popis';

  // Time
  detailTime.textContent = '🕐 ' + new Date(entry.timestamp).toLocaleString('cs-CZ');

  // Copy button
  const copyText = entry.spz || entry.vehicle || '';
  detailCopyBtn.onclick = () => {
    copyToClipboard(copyText);
    detailCopyBtn.textContent = '✓ ZKOPÍROVÁNO';
    setTimeout(() => detailCopyBtn.textContent = '📋 ZKOPÍROVAT', 1500);
  };

  detailModal.classList.add('show');
}

detailCloseBtn.addEventListener('click', () => detailModal.classList.remove('show'));
detailModal.addEventListener('click', e => { if (e.target === detailModal) detailModal.classList.remove('show'); });

// ── Settings ───────────────────────────────────────────────────────────────
function openSettings(msg) {
  keyInput.value = apiKey;
  keyStatus.className = 'key-status';
  if (msg) {
    keyStatus.textContent = msg;
    keyStatus.className = 'key-status err';
  }
  settingsModal.classList.add('show');
}

settingsBtn.addEventListener('click', () => openSettings());
settingsModal.addEventListener('click', e => {
  if (e.target === settingsModal) settingsModal.classList.remove('show');
});

eyeBtn.addEventListener('click', () => {
  keyInput.type = keyInput.type === 'password' ? 'text' : 'password';
});

document.getElementById('keyFileBtn').addEventListener('click', () => {
  document.getElementById('key-file-input').click();
});

document.getElementById('key-file-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var text = ev.target.result.trim();
    var lines = text.split(/[\r\n]+/).map(function(l) { return l.trim(); });
    var key = '';
    for (var i = 0; i < lines.length; i++) {
      if (lines[i].indexOf('sk-ant-') === 0) { key = lines[i]; break; }
    }
    if (!key && lines.length > 0 && lines[0].length > 10) key = lines[0];
    if (key) {
      keyInput.value = key;
      keyStatus.textContent = '✓ KLÍČ NAČTEN ZE SOUBORU';
      keyStatus.className = 'key-status ok';
    } else {
      keyStatus.textContent = '✗ V SOUBORU NEBYL NALEZEN KLÍČ';
      keyStatus.className = 'key-status err';
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

saveKeyBtn.addEventListener('click', () => {
  const key = keyInput.value.trim();
  if (!key) {
    keyStatus.textContent = 'Zadej API klíč!';
    keyStatus.className = 'key-status err';
    return;
  }
  apiKey = key;
  localStorage.setItem('spz_apikey', key);
  keyStatus.textContent = '✓ ULOŽENO';
  keyStatus.className = 'key-status ok';
  setTimeout(() => settingsModal.classList.remove('show'), 800);
});

// ── Utils ──────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── PWA Service Worker ─────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Fullscreen on landscape ────────────────────────────────────────────────
function isLandscape() {
  return window.innerWidth > window.innerHeight;
}

function enterFullscreen() {
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (req) req.call(el).catch(() => {});
}

function exitFullscreen() {
  const ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
  if (ex) ex.call(document).catch(() => {});
}

window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    if (isLandscape()) enterFullscreen();
    else exitFullscreen();
  }, 150);
});

screen.orientation && screen.orientation.addEventListener('change', () => {
  setTimeout(() => {
    if (isLandscape()) enterFullscreen();
    else exitFullscreen();
  }, 150);
});

// Also handle resize as fallback
window.addEventListener('resize', () => {
  if (isLandscape()) enterFullscreen();
  else exitFullscreen();
});

// ── Init ───────────────────────────────────────────────────────────────────
startCamera();

// Show settings on first launch
if (!apiKey) {
  setTimeout(() => openSettings('Pro použití nastav Claude API klíč'), 600);
}

// Enter fullscreen if already landscape on load
if (isLandscape()) enterFullscreen();
</script>
</body>
</html>
